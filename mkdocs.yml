site_name: sandbox
site_description: CLI pour gérer le cycle de vie des expérimentations de développement
site_url: https://tomboulier.github.io/sandbox
repo_url: https://github.com/tomboulier/sandbox

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.instant
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: numpy
            show_source: false

nav:
  - Accueil: index.md
  - Référence API: reference.md
